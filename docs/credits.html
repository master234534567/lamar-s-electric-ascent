<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Credits — Lamar Jackson</title>
    <style>
      * { box-sizing: border-box; }
      html, body { margin: 0; min-height: 100%; }
      body {
        font-family: Inter, ui-sans-serif, system-ui, sans-serif;
        color: #f6efff;
        background: radial-gradient(circle at top left, rgba(123, 47, 190, 0.22), transparent 22%),
                    radial-gradient(circle at 80% 10%, rgba(255, 215, 0, 0.14), transparent 14%),
                    radial-gradient(circle at 20% 80%, rgba(125, 41, 190, 0.16), transparent 18%),
                    #080113;
        overflow: hidden;
      }
      .credits-shell {
        position: relative;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem;
      }
      .credits-panel {
        position: relative;
        width: 100%;
        max-width: 960px;
        padding: 3.5rem 2.5rem;
        border-radius: 40px;
        background: rgba(19, 7, 46, 0.88);
        box-shadow: 0 40px 130px rgba(123, 47, 190, 0.28);
        overflow: hidden;
        border: 1px solid rgba(255, 215, 0, 0.12);
      }
      .credits-panel::before {
        content: "";
        position: absolute;
        inset: 0;
        background: radial-gradient(circle at 25% 25%, rgba(255, 255, 255, 0.12), transparent 18%),
                    radial-gradient(circle at 80% 20%, rgba(123, 47, 190, 0.2), transparent 22%);
        pointer-events: none;
      }
      .credits-panel::after {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(135deg, rgba(123, 47, 190, 0.08), transparent 45%, rgba(255, 215, 0, 0.06));
        pointer-events: none;
      }
      .credits-title {
        margin: 0;
        font-size: clamp(3rem, 6vw, 5.2rem);
        line-height: 0.95;
        letter-spacing: -0.05em;
        text-shadow: 0 0 24px rgba(123, 47, 190, 0.8), 0 0 45px rgba(255, 215, 0, 0.18);
      }
      .credits-subtitle {
        margin: 1.2rem 0 0;
        font-size: clamp(1.05rem, 1.5vw, 1.45rem);
        color: #dbccff;
        text-shadow: 0 0 18px rgba(123, 47, 190, 0.25);
      }
      .lightning-pulse {
        margin: 2.5rem auto 0;
        width: 100px;
        height: 100px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(255, 255, 255, 0.6), rgba(255, 215, 0, 0.22) 40%, transparent 70%);
        box-shadow: 0 0 50px rgba(255, 215, 0, 0.35);
        animation: pulseBolt 1.6s ease-in-out infinite;
      }
      .lightning-pulse span {
        font-size: 3rem;
        line-height: 1;
      }
      .back-button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        margin: 3rem auto 0;
        padding: 1rem 1.8rem;
        border-radius: 999px;
        background: linear-gradient(135deg, rgba(123, 47, 190, 0.96), rgba(255, 215, 0, 0.95));
        color: #12003e;
        font-weight: 800;
        text-decoration: none;
        box-shadow: 0 22px 60px rgba(123, 47, 190, 0.28);
      }
      .starfield {
        position: absolute;
        inset: 0;
        overflow: hidden;
        pointer-events: none;
      }
      .starfield span {
        position: absolute;
        display: block;
        width: 3px;
        height: 3px;
        background: #fff;
        border-radius: 50%;
        opacity: 0.85;
        box-shadow: 0 0 12px rgba(255, 255, 255, 0.45);
        animation: twinkle 4s infinite ease-in-out alternate;
      }
      .starfield span:nth-child(1) { top: 8%; left: 14%; animation-duration: 3.8s; }
      .starfield span:nth-child(2) { top: 26%; left: 78%; animation-duration: 4.4s; }
      .starfield span:nth-child(3) { top: 47%; left: 53%; animation-duration: 3.5s; }
      .starfield span:nth-child(4) { top: 64%; left: 16%; animation-duration: 4.8s; }
      .starfield span:nth-child(5) { top: 72%; left: 84%; animation-duration: 3.2s; }
      .starfield span:nth-child(6) { top: 38%; left: 28%; animation-duration: 4.1s; }
      .starfield span:nth-child(7) { top: 88%; left: 44%; animation-duration: 3.9s; }
      .starfield span:nth-child(8) { top: 54%; left: 92%; animation-duration: 4.6s; }
      @keyframes pulseBolt {
        0%, 100% { transform: scale(1); box-shadow: 0 0 50px rgba(255, 215, 0, 0.35); }
        50% { transform: scale(1.08); box-shadow: 0 0 70px rgba(255, 215, 0, 0.5); }
      }
      @keyframes twinkle {
        0% { opacity: 0.35; transform: translateY(0); }
        100% { opacity: 1; transform: translateY(-4px); }
      }
    </style>
  </head>
  <body>
    <div class="credits-shell">
      <div class="credits-panel">
        <div class="starfield">
          <span></span><span></span><span></span><span></span>
          <span></span><span></span><span></span><span></span>
        </div>
        <h1 class="credits-title">Created by Onur</h1>
        <p class="credits-subtitle">The Mind Behind The GOAT Site</p>
        <div class="lightning-pulse"><span>⚡</span></div>
        <a class="back-button" href="index.html">Back to main page</a>
      </div>
    </div>
  </body>
</html>
