<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LAMAR JACKSON — The Franchise</title>
    <meta name="description" content="A cinematic, scroll-driven tribute to Lamar Jackson. Speed. Arm talent. MVP. The Franchise." />
    <script type="module" crossorigin src="./assets/index-CrkRhmqm.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/index-DOxc0iCo.css">
    <style>
      .fab-button {
        position: fixed;
        bottom: 30px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 0.95rem 1.6rem;
        border-radius: 50px;
        background: rgba(12, 5, 25, 0.72);
        backdrop-filter: blur(10px);
        border: 1px solid #7B2FBE;
        color: #fff;
        font-weight: 700;
        text-decoration: none;
        box-shadow: 0 18px 40px rgba(123, 47, 190, 0.22);
        transition: transform 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease;
        z-index: 10000;
      }
      .fab-button:hover {
        transform: scale(1.05);
        box-shadow: 0 22px 52px rgba(123, 47, 190, 0.35);
      }
      .fab-left { left: 30px; }
      .fab-right { right: 30px; }
      .photos-section {
        position: relative;
        padding: 6rem 1.25rem;
        background: linear-gradient(180deg, rgba(6, 2, 12, 0.92), rgba(16, 6, 34, 0.98));
        overflow: hidden;
      }
      .photos-section::before {
        content: '';
        position: absolute;
        inset: 0;
        background: radial-gradient(circle at 20% 20%, rgba(123, 47, 190, 0.14), transparent 22%),
                    radial-gradient(circle at 85% 10%, rgba(123, 47, 190, 0.12), transparent 18%);
        pointer-events: none;
      }
      .photos-wrapper { position: relative; z-index: 1; }
      .photos-heading { text-align: center; max-width: 920px; margin: 0 auto 2.5rem; color: #fff; }
      .photos-heading h2 { margin: 0; font-size: clamp(2.6rem, 5vw, 4rem); line-height: 1.02; text-shadow: 0 0 30px rgba(123, 47, 190, 0.45); }
      .photos-heading p { margin: 1rem auto 0; max-width: 720px; color: rgba(255, 255, 255, 0.78); font-size: 1rem; }
      .photos-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 1.5rem;
        max-width: 1200px;
        margin: 0 auto;
      }
      .photo-card {
        background: rgba(10, 5, 23, 0.78);
        border: 1px solid rgba(123, 47, 190, 0.2);
        border-radius: 26px;
        overflow: hidden;
        box-shadow: 0 24px 80px rgba(123, 47, 190, 0.16);
        transform: translateY(32px);
        opacity: 0;
        transition: transform 0.45s ease, opacity 0.45s ease, border-color 0.3s ease, box-shadow 0.3s ease;
      }
      .photo-card.visible {
        opacity: 1;
        transform: translateY(0);
      }
      .photo-card:hover {
        border-color: rgba(123, 47, 190, 0.85);
        box-shadow: 0 28px 90px rgba(123, 47, 190, 0.35);
      }
      .photo-card img {
        width: 100%;
        height: 280px;
        object-fit: cover;
        display: block;
      }
      .photo-card-content {
        padding: 1.4rem 1.3rem 1.6rem;
      }
      .photo-card-title {
        margin: 0 0 0.8rem;
        font-size: 1.25rem;
        font-weight: 800;
        color: #fff;
      }
      .photo-card-text {
        margin: 0;
        color: rgba(255, 255, 255, 0.78);
        line-height: 1.75;
      }
      @media (max-width: 960px) {
        .photos-grid { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script>
      function createButton(href, text, extraClass) {
        const a = document.createElement('a');
        a.href = href;
        a.className = 'fab-button ' + extraClass;
        a.textContent = text;
        return a;
      }

      function createLamarPhotosSection() {
        const section = document.createElement('section');
        section.className = 'photos-section';
        section.innerHTML = `
          <div class="photos-wrapper">
            <div class="photos-heading">
              <h2>Lamar Moments</h2>
              <p>Three new snapshots of Lamar in a premium dark glass layout, designed to match the site's purple cinematic energy.</p>
            </div>
            <div class="photos-grid">
              <div class="photo-card"><img src="./assets/lamar1.png" alt="The King"><div class="photo-card-content"><h3 class="photo-card-title">The King</h3><p class="photo-card-text">Lamar Jackson reigns over Baltimore with unmatched speed, style, and the kind of energy that turns every play into a highlight.</p></div></div>
              <div class="photo-card"><img src="./assets/lamar2.png" alt="No.8"><div class="photo-card-content"><h3 class="photo-card-title">No.8</h3><p class="photo-card-text">The number eight is more than a jersey — it is the signature of a quarterback who rewrites the rules on every snap.</p></div></div>
              <div class="photo-card"><img src="./assets/lamar3.png" alt="Electric"><div class="photo-card-content"><h3 class="photo-card-title">Electric</h3><p class="photo-card-text">Pure electricity on the field, Lamar's arm and legs combine to make every game a cinematic, pulse-pounding experience.</p></div></div>
            </div>
          </div>
        `;
        return section;
      }

      function insertPhotosSection() {
        const root = document.getElementById('root');
        if (!root) return;
        const headings = Array.from(root.querySelectorAll('h1, h2, h3, h4, h5, h6'));
        const armHeading = headings.find(h => /ARM\s*TALENT/i.test(h.textContent || ''));
        const franchiseHeading = headings.find(h => /THE\s*FRANCHISE/i.test(h.textContent || ''));
        if (!armHeading || !franchiseHeading) return;
        const armSection = armHeading.closest('section');
        if (!armSection) return;
        if (document.querySelector('.photos-section')) return;
        armSection.parentNode.insertBefore(createLamarPhotosSection(), armSection.nextSibling);
        const cards = document.querySelectorAll('.photo-card');
        const observer = new IntersectionObserver((entries, obs) => {
          entries.forEach(entry => {
            if (entry.isIntersecting) {
              entry.target.classList.add('visible');
              obs.unobserve(entry.target);
            }
          });
        }, { threshold: 0.2 });
        cards.forEach(card => observer.observe(card));
      }

      function attachButtons() {
        if (document.querySelector('.fab-right') == null) {
          document.body.appendChild(createButton('credits.html', 'CREDITS ⚡', 'fab-right'));
        }
        if (document.querySelector('.fab-left') == null) {
          document.body.appendChild(createButton('backstory.html', 'WHO IS THE FAN? 👀', 'fab-left'));
        }
      }

      function initEnhancements() {
        insertPhotosSection();
        attachButtons();
      }

      window.addEventListener('load', () => {
        initEnhancements();
        setTimeout(initEnhancements, 1200);
        const root = document.getElementById('root');
        if (root) {
          const mo = new MutationObserver(() => {
            initEnhancements();
          });
          mo.observe(root, { childList: true, subtree: true });
        }
      });
    </script>
  </body>
</html>
